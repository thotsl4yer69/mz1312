# MAZLABZ.AI Website Deployment Workflow
# This workflow automatically deploys the static website to GitHub Pages
# whenever changes are pushed to the main branch.

name: Deploy MAZLABZ.AI Website

# Trigger the workflow on push to main branch
on:
  push:
    branches: [ main ]
  
  # Allow manual workflow dispatch
  workflow_dispatch:

# Set permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Ensure only one deployment runs at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job - prepare the website for deployment
  build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for better Git context

      # Step 2: Setup Node.js (if needed for future build tools)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
        # Only run if package.json exists
        if: hashFiles('**/package.json') != ''

      # Step 3: Install dependencies (if package.json exists)
      - name: Install dependencies
        run: npm ci
        if: hashFiles('**/package.json') != ''

      # Step 4: Build the website (if build script exists)
      - name: Build website
        run: npm run build
        if: hashFiles('**/package.json') != ''

      # Step 5: Setup GitHub Pages configuration
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Step 6: Upload the website files as an artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire repository (since it's a static site)
          path: '.'

  # Deploy job - deploy to GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      # Step 1: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3

  # Optional: Lighthouse CI job for performance monitoring
  lighthouse:
    runs-on: ubuntu-latest
    needs: deploy
    # Only run on main branch and skip for workflow_dispatch
    if: github.event_name == 'push'
    steps:
      # Step 1: Checkout code for Lighthouse CI
      - name: Checkout
        uses: actions/checkout@v4

      # Step 2: Wait for deployment to be available
      - name: Wait for deployment
        run: sleep 30

      # Step 3: Run Lighthouse CI (optional quality check)
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          configPath: './.lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true  # Don't fail deployment if Lighthouse fails

